// Protocol Buffers schema for MLIR EDSL AST
// Serialization between Python frontend and C++ backend

syntax = "proto3";

package mlir_edsl;

// Value types supported in the EDSL
enum ValueType {
  I32 = 0;
  F32 = 1;
  I1 = 2;
}

// Binary operations
enum BinaryOpType {
  ADD = 0;
  SUB = 1;
  MUL = 2;
  DIV = 3;
}

// Broadcast modes for array-scalar operations
enum BroadcastMode {
  NONE = 0;          // Both operands are arrays (same shape)
  SCALAR_LEFT = 1;   // Left operand is scalar, right is array
  SCALAR_RIGHT = 2;  // Left operand is array, right is scalar
}

// Comparison predicates
enum ComparisonPredicate {
  // Generic (maps to signed int or ordered float)
  GT = 0;   // Greater than
  LT = 1;   // Less than
  EQ = 2;   // Equal
  NE = 3;   // Not equal
  GE = 4;   // Greater than or equal
  LE = 5;   // Less than or equal

  // Signed integer comparisons (MLIR arith.cmpi)
  SLT = 6;  // Signed less than
  SLE = 7;  // Signed less than or equal
  SGT = 8;  // Signed greater than
  SGE = 9;  // Signed greater than or equal

  // Unsigned integer comparisons
  ULT = 10; // Unsigned less than
  ULE = 11; // Unsigned less than or equal
  UGT = 12; // Unsigned greater than
  UGE = 13; // Unsigned greater than or equal

  // Float comparisons (MLIR arith.cmpf) - ordered
  OLT = 14; // Ordered less than
  OLE = 15; // Ordered less than or equal
  OGT = 16; // Ordered greater than
  OGE = 17; // Ordered greater than or equal
  OEQ = 18; // Ordered equal
  ONE = 19; // Ordered not equal

  // Float comparisons - unordered
  UEQ = 20; // Unordered equal
  UNE = 21; // Unordered not equal
}

// Main AST node container
message ASTNode {
  oneof value_data {
    Constant constant = 1;
    Parameter parameter = 2;
    BinaryOp binary_op = 3;
    CompareOp compare_op = 4;
    IfOp if_op = 5;
    CallOp call_op = 6;
    ForLoopOp for_loop_op = 7;
    WhileLoopOp while_loop_op = 8;
    CastOp cast_op = 9;
    LetBinding let_binding = 10;
    ValueReference value_ref = 11;
    ArrayLiteral array_literal = 12;
    ArrayAccess array_access = 13;
    ArrayStore array_store = 14;
    ArrayBinaryOp array_binary_op = 15;
  }
}

// Constant value (integer or float)
message Constant {
  int32 int_value = 1;
  float float_value = 2;
  ValueType value_type = 3;
}

// Array type specification (shape and element type)
message ArrayTypeSpec {
  repeated int32 shape = 1;    // Array shape: [N] for 1D, [M,N] for 2D, [M,N,P] for 3D
  ValueType element_type = 2;  // Element type (I32, F32, I1)
}

// Named parameter with value
message Parameter {
  string name = 1;
  int32 int_value = 2;
  float float_value = 3;
  ValueType value_type = 4;
}

// Binary operation (add, sub, mul, div)
message BinaryOp {
  BinaryOpType op_type = 1;
  ASTNode left = 2;   // Nested node
  ASTNode right = 3;  // Nested node
  ValueType result_type = 4;  // Result type after type promotion (set by Python)
}

// Comparison operation
message CompareOp {
  ComparisonPredicate predicate = 1;
  ASTNode left = 2;
  ASTNode right = 3;
  ValueType operand_type = 4;  // Operand type after promotion (set by Python)
}

// Conditional operation (if-then-else)
message IfOp {
  ASTNode condition = 1;
  ASTNode then_value = 2;
  ASTNode else_value = 3;
  ValueType result_type = 4;  // Result type (set by Python after branch validation)
}

// Function call operation
message CallOp {
  string func_name = 1;
  repeated ASTNode args = 2;  // Array of argument nodes

  // Return type specification (exactly one must be set)
  oneof return_type_spec {
    ValueType scalar_return = 3;    // Scalar: i32, f32, i1
    ArrayTypeSpec array_return = 4; // Array: memref<NxT>, memref<MxNxT>
  }
}

// For loop operation (scf.for)
message ForLoopOp {
  ASTNode start = 1;          // Loop start bound (inclusive)
  ASTNode end = 2;            // Loop end bound (exclusive)
  ASTNode step = 3;           // Loop step/increment
  ASTNode init_value = 4;     // Initial accumulator value
  BinaryOpType operation = 5; // Loop body operation
  ValueType result_type = 6;  // Result type (set by Python, all inputs must match)
}

// While loop operation (scf.while)
message WhileLoopOp {
  ASTNode init_value = 1;          // Initial loop value
  ASTNode target = 2;              // Comparison target value
  BinaryOpType operation = 3;      // Loop body operation
  ComparisonPredicate predicate = 4; // Comparison predicate enum
  ValueType result_type = 5;       // Result type (set by Python, init_value and target must match)
}

// Cast operation (explicit type conversion)
message CastOp {
  ASTNode value = 1;          // Value to cast
  ValueType target_type = 2;  // Target type to cast to
}

// Array literal creation: Array[4, i32]([1, 2, 3, 4])
message ArrayLiteral {
  ArrayTypeSpec array_type = 1;  // Array type (size + element type)
  repeated ASTNode elements = 2;  // Array elements (must match array_type.size)
}

// Array element access: arr[i] or arr[i,j] or arr[i,j,k]
message ArrayAccess {
  ASTNode array = 1;           // Array to index into (must be ArrayLiteral or array-typed value)
  repeated ASTNode indices = 2; // Index values (must be I32, count must match array dimensions)
}

// Array element store: arr.at[i].set(v) or arr.at[i,j].set(v)
message ArrayStore {
  ASTNode array = 1;            // Array to store into
  repeated ASTNode indices = 2; // Index values (must be I32, count must match array dimensions)
  ASTNode value = 3;            // Value to store (must match array element type)
}

// Element-wise binary operation on arrays
message ArrayBinaryOp {
  BinaryOpType op_type = 1;        // ADD, SUB, MUL, DIV
  ASTNode left = 2;                // Left operand (array or scalar)
  ASTNode right = 3;               // Right operand (array or scalar)
  ArrayTypeSpec result_type = 4;   // Result array shape (size + element type)
  BroadcastMode broadcast = 5;     // Broadcasting mode
}

// Let binding for SSA value reuse (marks first use of a shared value)
message LetBinding {
  int64 node_id = 1;  // Unique ID for this value
  ASTNode value = 2;  // The expression to evaluate once
}

// Value reference for SSA value reuse (references a previously bound value)
message ValueReference {
  int64 node_id = 1;  // Reference to a let-bound value
}

// Root message for the entire AST
message ASTRoot {
  ASTNode root = 1;  // Root node of the expression tree
}

// Function parameter definition
message FunctionParameter {
  string name = 1;
  ValueType type = 2;
}

// Complete function definition (name, signature, body)
message FunctionDef {
  string name = 1;                    // Function name
  repeated FunctionParameter params = 2;  // Function parameters
  ASTNode body = 4;                   // Function body AST

  // Return type specification (exactly one must be set)
  oneof return_type_spec {
    ValueType scalar_return = 3;      // Scalar: i32, f32, i1
    ArrayTypeSpec array_return = 5;   // Array: memref<NxT>, memref<MxNxT>
  }
}

// Function signature (lightweight version for executor registration)
message FunctionSignature {
  string name = 1;                    // Function name
  repeated ValueType param_types = 2; // Parameter types (just enums)

  // Return type specification (exactly one must be set)
  oneof return_type_spec {
    ValueType scalar_return = 3;      // Scalar return
    ArrayTypeSpec array_return = 4;   // Array return
  }
}