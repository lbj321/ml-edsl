// Protocol Buffers schema for MLIR EDSL AST - NEW ALGEBRAIC TYPE SYSTEM
// Serialization between Python frontend and C++ backend

syntax = "proto3";

package mlir_edsl;

// ============================================================================
// NEW ALGEBRAIC TYPE SYSTEM
// ============================================================================

// Unified type specification - algebraic and compositional
message TypeSpec {
  oneof type_kind {
    ScalarTypeSpec scalar = 1;
    MemRefTypeSpec memref = 2;
    TensorTypeSpec tensor = 3;
    // Future extensions:
    // TupleTypeSpec tuple = 4;
    // ComplexTypeSpec complex = 5;
  }
}

// Scalar type specification
message ScalarTypeSpec {
  enum Kind {
    I32 = 0;  // 32-bit signed integer
    F32 = 1;  // 32-bit float
    I1 = 2;   // Boolean (1-bit integer)
    INDEX = 3; // MLIR index type (for array indexing)
    // Future extensions:
    // I64 = 4;
    // F64 = 5;
    // I8 = 6;
    // I16 = 7;
  }
  Kind kind = 1;
}

// MemRef type specification (fixed-size arrays)
message MemRefTypeSpec {
  repeated int64 shape = 1;        // Shape: [4] for 1D, [2,3] for 2D, [2,3,4] for 3D
  TypeSpec element_type = 2;       // Element type (RECURSIVE - can be any TypeSpec!)

  // Future extensions for advanced memref features:
  // MemRefLayout layout = 3;      // Strided layouts, affine maps
  // MemorySpace memory_space = 4; // GPU global, shared, etc.
}

// Tensor type specification (value-semantic, immutable)
message TensorTypeSpec {
  repeated int64 shape = 1;        // Shape: [4] for 1D, [2,3] for 2D. Use -1 for dynamic dims.
  TypeSpec element_type = 2;       // Element type
}

// ============================================================================
// OPERATION ENUMS (Unchanged)
// ============================================================================

// Binary operations
enum BinaryOpType {
  ADD = 0;
  SUB = 1;
  MUL = 2;
  DIV = 3;
}

// Activation function types for linalg.generic-based activations
enum ActivationType {
  RELU = 0;
  LEAKY_RELU = 1;
}

// Broadcast modes for array/tensor binary operations
enum BroadcastMode {
  NONE = 0;                // Both operands are same shape
  SCALAR_LEFT = 1;         // Left operand is scalar, right is array/tensor
  SCALAR_RIGHT = 2;        // Left operand is array/tensor, right is scalar
  TENSOR_BIAS_RIGHT = 3;   // [M,N] op [N] — 1D bias on right, broadcast over rows
  TENSOR_BIAS_LEFT = 4;    // [N] op [M,N] — 1D bias on left, broadcast over rows
}

// Comparison predicates
enum ComparisonPredicate {
  // Generic (maps to signed int or ordered float)
  GT = 0;   // Greater than
  LT = 1;   // Less than
  EQ = 2;   // Equal
  NE = 3;   // Not equal
  GE = 4;   // Greater than or equal
  LE = 5;   // Less than or equal

  // Signed integer comparisons (MLIR arith.cmpi)
  SLT = 6;  // Signed less than
  SLE = 7;  // Signed less than or equal
  SGT = 8;  // Signed greater than
  SGE = 9;  // Signed greater than or equal

  // Unsigned integer comparisons
  ULT = 10; // Unsigned less than
  ULE = 11; // Unsigned less than or equal
  UGT = 12; // Unsigned greater than
  UGE = 13; // Unsigned greater than or equal

  // Float comparisons (MLIR arith.cmpf) - ordered
  OLT = 14; // Ordered less than
  OLE = 15; // Ordered less than or equal
  OGT = 16; // Ordered greater than
  OGE = 17; // Ordered greater than or equal
  OEQ = 18; // Ordered equal
  ONE = 19; // Ordered not equal

  // Float comparisons - unordered
  UEQ = 20; // Unordered equal
  UNE = 21; // Unordered not equal
}

// ============================================================================
// AST NODE DEFINITIONS (Updated to use TypeSpec)
// ============================================================================

// Main AST node container - hierarchical for scalability
message ASTNode {
  oneof node {
    ScalarNode scalar = 1;
    ArrayNode array = 2;
    ControlFlowNode control_flow = 3;
    FunctionNode function = 4;
    BindingNode binding = 5;
    TensorNode tensor = 6;
    LinalgNode linalg = 7;
  }
}

// Scalar operations (constants, arithmetic, comparisons, casts)
message ScalarNode {
  oneof value {
    Constant constant = 1;
    BinaryOp binary_op = 2;
    CompareOp compare_op = 3;
    CastOp cast_op = 4;
  }
}

// Array/MemRef operations
message ArrayNode {
  oneof value {
    ArrayLiteral literal = 1;
    ArrayAccess access = 2;
    ArrayStore store = 3;
    ArrayBinaryOp binary_op = 4;
  }
}

// Tensor operations (value-semantic)
message TensorNode {
  oneof value {
    TensorFromElements from_elements = 1;
    TensorExtract extract = 2;
    TensorInsert insert = 3;
    TensorEmpty empty = 4;
  }
}

// Control flow operations
message ControlFlowNode {
  oneof value {
    IfOp if_op = 1;
    ForLoopOp for_loop = 2;
    ForIndex for_index = 3;
    ForIterArg for_iter_arg = 4;
  }
}

// Function-related operations
message FunctionNode {
  oneof value {
    Parameter parameter = 1;
    CallOp call = 2;
  }
}

// SSA value binding operations
message BindingNode {
  oneof value {
    LetBinding let = 1;
    ValueReference ref = 2;
  }
}

// ============================================================================
// SCALAR OPERATIONS
// ============================================================================

// Constant value (integer, float, or boolean)
message Constant {
  oneof value {
    int32 int_value = 1;
    float float_value = 2;
    bool bool_value = 3;
  }
  TypeSpec type = 4;  // Type specification (ScalarTypeSpec)
}

// Function parameter
message Parameter {
  string name = 1;
  TypeSpec type = 2;  // Parameter type (ScalarTypeSpec for Phase 7A)
}

// Binary operation (add, sub, mul, div)
message BinaryOp {
  BinaryOpType op_type = 1;
  ASTNode left = 2;
  ASTNode right = 3;
  TypeSpec result_type = 4;  // Result type after type checking
}

// Comparison operation
message CompareOp {
  ComparisonPredicate predicate = 1;
  ASTNode left = 2;
  ASTNode right = 3;
  TypeSpec operand_type = 4;  // Operand type after type checking
}

// Conditional operation (if-then-else)
message IfOp {
  ASTNode condition = 1;
  ASTNode then_value = 2;
  ASTNode else_value = 3;
  TypeSpec result_type = 4;  // Result type (validated by Python)
}

// Cast operation (explicit type conversion)
message CastOp {
  ASTNode value = 1;
  TypeSpec source_type = 2;  // Source type
  TypeSpec target_type = 3;  // Target type
}

// ============================================================================
// CONTROL FLOW
// ============================================================================

// For loop operation (scf.for) with lambda body
message ForLoopOp {
  ASTNode start = 1;          // Loop start bound (inclusive)
  ASTNode end = 2;            // Loop end bound (exclusive)
  ASTNode step = 3;           // Loop step/increment
  ASTNode init_value = 4;     // Initial accumulator value
  reserved 5;                  // Was: BinaryOpType operation (removed)
  TypeSpec result_type = 6;    // Result type (validated by Python)
  reserved 7;                  // Was: loop_id (removed)
  ASTNode body = 8;            // Lambda body AST (references ForIndex/ForIterArg nodes)
  int64 index_node_id = 9;     // ForIndex placeholder node ID → injected as %iv in body
  int64 iter_arg_node_id = 10; // ForIterArg placeholder node ID → injected as %iter_arg in body
}

// For loop induction variable placeholder (leaf node, resolved at IR build time)
message ForIndex {
  int64 node_id = 1;          // Matches ForLoopOp.index_node_id; resolved to %iv in valueCache
}

// For loop iter_arg placeholder (leaf node, resolved at IR build time)
message ForIterArg {
  int64 node_id = 1;          // Matches ForLoopOp.iter_arg_node_id; resolved to %iter_arg in valueCache
  int32 arg_index = 2;        // Which iter_arg (0 for single accumulator)
}

// ============================================================================
// ARRAYS (MemRef)
// ============================================================================

// Array literal creation: Array[4, i32]([1, 2, 3, 4])
message ArrayLiteral {
  TypeSpec type = 1;              // Array type (MemRefTypeSpec)
  repeated ASTNode elements = 2;  // Array elements
}

// Array element access: arr[i] or arr[i,j] or arr[i,j,k]
message ArrayAccess {
  ASTNode array = 1;              // Array to index into
  repeated ASTNode indices = 2;   // Index values (must be i32)
  TypeSpec result_type = 3;       // Element type (ScalarTypeSpec)
}

// Array element store: arr.at[i].set(v) or arr.at[i,j].set(v)
message ArrayStore {
  ASTNode array = 1;              // Array to store into
  repeated ASTNode indices = 2;   // Index values (must be i32)
  ASTNode value = 3;              // Value to store
  TypeSpec result_type = 4;       // Result array type (MemRefTypeSpec)
}

// Element-wise binary operation on arrays
message ArrayBinaryOp {
  BinaryOpType op_type = 1;       // ADD, SUB, MUL, DIV
  ASTNode left = 2;               // Left operand (array or scalar)
  ASTNode right = 3;              // Right operand (array or scalar)
  TypeSpec result_type = 4;       // Result type (MemRefTypeSpec)
  BroadcastMode broadcast = 5;    // Broadcasting mode
}

// ============================================================================
// TENSORS (Value-semantic)
// ============================================================================

// Create tensor from scalar elements: tensor.from_elements
message TensorFromElements {
  TypeSpec type = 1;                // Tensor type (TensorTypeSpec)
  repeated ASTNode elements = 2;   // Scalar elements
}

// Extract scalar from tensor: tensor.extract
message TensorExtract {
  ASTNode tensor = 1;              // Tensor to extract from
  repeated ASTNode indices = 2;    // Index values
  TypeSpec result_type = 3;        // Element type (ScalarTypeSpec)
}

// Insert scalar into tensor: tensor.insert (returns NEW tensor)
message TensorInsert {
  ASTNode tensor = 1;              // Tensor to insert into
  repeated ASTNode indices = 2;    // Index values
  ASTNode value = 3;               // Value to insert
  TypeSpec result_type = 4;        // Result tensor type (TensorTypeSpec)
}

// Create uninitialized tensor: tensor.empty
message TensorEmpty {
  TypeSpec type = 1;               // Tensor type (TensorTypeSpec with shape + element type)
  repeated ASTNode dynamic_dims = 2; // Runtime values for dynamic (?) dimensions, in order
}

// ============================================================================
// LINALG OPERATIONS
// ============================================================================

// Top-level linalg node container
message LinalgNode {
  oneof value {
    LinalgDot               dot             = 1;
    LinalgMatmul            matmul          = 2;
    LinalgMap               map             = 3;
    LinalgMapElement        map_element     = 4;
    LinalgReduce            reduce          = 5;
    LinalgReduceElement     reduce_element  = 6;
    LinalgReduceAccumulator reduce_accum    = 7;
    LinalgBinaryOp          binary_op       = 8;
    LinalgActivation        activation      = 9;
  }
}

// Dot product of two 1D arrays: linalg.dot
// Returns a scalar of the operand element type.
message LinalgDot {
  ASTNode lhs = 1;  // 1D memref (memref<Nxf32>, memref<Nxi32>, etc.)
  ASTNode rhs = 2;  // 1D memref, same element type as lhs
}

// Matrix multiply of two 2D arrays: linalg.matmul
// Returns a 2D memref (out_type). Shape: lhs[M,K] x rhs[K,N] → out[M,N].
message LinalgMatmul {
  ASTNode  lhs      = 1;  // 2D memref (memref<MxKxf32>)
  ASTNode  rhs      = 2;  // 2D memref (memref<KxNxf32>)
  TypeSpec out_type = 3;  // Output MemRefTypeSpec (memref<MxNxf32>)
}

// Element-wise binary op on tensors with optional broadcasting.
// Covers same-shape (NONE), scalar (SCALAR_*), and bias-add (TENSOR_BIAS_*) patterns.
// NONE:               lhs[...] op rhs[...]   — same shape
// SCALAR_LEFT:        scalar   op rhs[...]
// SCALAR_RIGHT:       lhs[...] op scalar
// TENSOR_BIAS_RIGHT:  lhs[M,N] op rhs[N]     — broadcast bias over rows
// TENSOR_BIAS_LEFT:   lhs[N]   op rhs[M,N]   — broadcast bias over rows
message LinalgBinaryOp {
  ASTNode       lhs       = 1;
  ASTNode       rhs       = 2;
  BinaryOpType  op_type   = 3;
  BroadcastMode broadcast = 4;
  TypeSpec      out_type  = 5;
}

// Element-wise map over a 1D array: linalg.map (MapOp)
// body references LinalgMapElement placeholder via element_node_id.
message LinalgMap {
  ASTNode  input           = 1;  // 1D memref input
  ASTNode  body            = 2;  // body expression (references LinalgMapElement)
  int64    element_node_id = 3;  // LinalgMapElement placeholder node ID
  TypeSpec out_type        = 4;  // output MemRefTypeSpec (same shape as input)
}

// Placeholder for the linalg.map body block argument.
// Leaf node — resolved to linalg.map body block arg at build time via valueCache.
message LinalgMapElement {
  int64 node_id = 1;  // resolved to linalg.map body block arg at build time
}

// Reduction over a 1D array: linalg.reduce
// body references LinalgReduceElement and LinalgReduceAccumulator via their node_ids.
message LinalgReduce {
  ASTNode  input           = 1;  // 1D memref input
  ASTNode  init            = 2;  // scalar init value (stored into 0-D accumulator)
  ASTNode  body            = 3;  // body expression: fn(element, accumulator) → scalar
  int64    element_node_id = 4;  // LinalgReduceElement placeholder node ID
  int64    accum_node_id   = 5;  // LinalgReduceAccumulator placeholder node ID
  TypeSpec elem_type       = 6;  // element type (for type inference)
}

// Placeholder for the input element in linalg.reduce body.
message LinalgReduceElement {
  int64 node_id = 1;
}

// Placeholder for the accumulator in linalg.reduce body.
message LinalgReduceAccumulator {
  int64 node_id = 1;
}

// Known activation function emitted as linalg.generic with arith ops.
// RELU:       arith.maximumf(x, 0)
// LEAKY_RELU: arith.select(x > 0, x, alpha * x)
message LinalgActivation {
  ASTNode        input    = 1;
  ActivationType act_type = 2;
  float          alpha    = 3;  // only meaningful for LEAKY_RELU
  TypeSpec       out_type = 4;
}

// ============================================================================
// FUNCTION OPERATIONS
// ============================================================================

// Function call operation
message CallOp {
  string func_name = 1;
  repeated ASTNode args = 2;  // Function arguments
  TypeSpec return_type = 3;   // Return type specification
}

// ============================================================================
// SSA VALUE REUSE
// ============================================================================

// Let binding for SSA value reuse (marks first use of a shared value)
message LetBinding {
  int64 node_id = 1;  // Unique ID for this value
  ASTNode value = 2;  // The expression to evaluate once
}

// Value reference for SSA value reuse (references a previously bound value)
message ValueReference {
  int64 node_id = 1;  // Reference to a let-bound value
}

// ============================================================================
// TOP-LEVEL STRUCTURES
// ============================================================================

// Root message for the entire AST
message ASTRoot {
  ASTNode root = 1;  // Root node of the expression tree
}

// Function parameter definition
message FunctionParameter {
  string name = 1;
  TypeSpec type = 2;  // Parameter type
}

// Complete function definition (name, signature, body)
message FunctionDef {
  string name = 1;                       // Function name
  repeated FunctionParameter params = 2; // Function parameters
  TypeSpec return_type = 3;              // Return type specification
  ASTNode body = 4;                      // Function body AST
}

// Function signature (lightweight version for executor registration)
message FunctionSignature {
  string name = 1;                    // Function name
  repeated TypeSpec param_types = 2;  // Parameter types
  TypeSpec return_type = 3;           // Return type
}
